name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout organization module
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install Console dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust
        run: |
          cargo fmt --all --check
          cargo test --locked -p lenso-module-organization
          cargo test --locked -p lenso-module-organization --features audit-log

      - name: Check Console
        run: |
          pnpm test
          pnpm typecheck
          pnpm build

      - name: Verify reviewed release plan and packages
        if: ${{ startsWith(github.head_ref, 'release/') }}
        run: |
          node scripts/release-plan.mjs --verify
          jq -r '.packages[].id | select(startswith("cargo:")) | sub("^cargo:"; "")' .lenso-release/plan.json |
            while read -r package; do cargo package --locked --allow-dirty -p "$package"; done
          jq -r '.packages[].id | select(startswith("npm:")) | sub("^npm:"; "")' .lenso-release/plan.json |
            while read -r package; do pnpm --filter "$package" exec npm publish --dry-run --access public --registry https://registry.npmjs.org/; done
