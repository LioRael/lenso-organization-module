name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout organization module
        uses: actions/checkout@v4

      - name: Checkout audit log module
        run: |
          git clone --depth 1 https://github.com/LioRael/lenso-audit-log-module.git ../lenso-audit-log-module
          if [ ! -d ../lenso-audit-log-module/crates/audit-log ]; then
            git -C ../lenso-audit-log-module fetch --depth 1 origin feat/audit-log-module
            git -C ../lenso-audit-log-module checkout FETCH_HEAD
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install Console dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust
        run: |
          cargo fmt --all --check
          cargo test --locked -p lenso-module-organization
          cargo test --locked -p lenso-module-organization --features audit-log

      - name: Check Console
        run: |
          pnpm test
          pnpm typecheck
          pnpm build
