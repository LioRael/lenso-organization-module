name: Release

on: [] # Disabled after reviewed publisher adoption; retained until cutover cleanup.

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout organization module
        uses: actions/checkout@v6
        with:
          path: lenso-organization-module

      - name: Checkout audit log module
        run: |
          git clone --depth 1 https://github.com/LioRael/lenso-audit-log-module.git lenso-audit-log-module
          if [ ! -d lenso-audit-log-module/crates/audit-log ]; then
            git -C lenso-audit-log-module fetch --depth 1 origin feat/audit-log-module
            git -C lenso-audit-log-module checkout FETCH_HEAD
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Setup pnpm
        run: corepack enable

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile
        working-directory: lenso-organization-module

      - name: Verify
        run: |
          cargo fmt --all --check
          cargo test --locked -p lenso-module-organization
          cargo test --locked -p lenso-module-organization --features audit-log
          pnpm check
        working-directory: lenso-organization-module

      - name: Verify npm package
        run: npm pack --dry-run --registry https://registry.npmjs.org/
        working-directory: lenso-organization-module/packages/organization-console

      - name: Publish organization Rust crate
        if: ${{ inputs.publish_rust_crate }}
        run: |
          set -eu
          test -n "$CARGO_REGISTRY_TOKEN" || { echo "CARGO_REGISTRY_TOKEN is required when publishing the Rust crate" >&2; exit 1; }
          crate=lenso-module-organization
          version="$(cargo pkgid -p "$crate" | sed 's/.*#//' | sed 's/.*@//')"
          if curl -A 'lenso-organization-release-publish' -fsS \
            "https://crates.io/api/v1/crates/$crate/$version" >/dev/null 2>&1; then
            echo "$crate $version is already on crates.io; skipping."
          else
            cargo publish -p "$crate"
          fi
        working-directory: lenso-organization-module
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish organization console with trusted publishing
        if: ${{ inputs.publish_npm }}
        run: |
          set -eu
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "$package_name@$package_version" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "$package_name@$package_version is already on npm; skipping."
            exit 0
          fi

          npm publish --access public --registry https://registry.npmjs.org/
        working-directory: lenso-organization-module/packages/organization-console
